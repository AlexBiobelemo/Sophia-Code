{# Partial template for infinite scroll pagination #}
{% for snippet in snippets.items %}
<div class="snippet-item" data-snippet-id="{{ snippet.id }}">
    <a href="{{ url_for('main.view_snippet', snippet_id=snippet.id) }}" class="snippet-link">
        <div class="snippet-icon">
            <i class="bi bi-filetype-{{ snippet.language }} text-primary"></i>
        </div>
        <div class="snippet-info">
            <div class="snippet-title" title="{{ snippet.title }}">
                {{ snippet.title }}
            </div>
            <div class="snippet-meta">
                {% if snippet.collection %}
                <span class="snippet-collection">
                    <i class="bi bi-folder me-1"></i>{{ snippet.collection.name }}
                </span>
                {% endif %}
                <span class="snippet-language">{{ snippet.language }}</span>
            </div>
        </div>
    </a>
    <div class="snippet-actions">
        <a href="{{ url_for('main.edit_snippet', snippet_id=snippet.id) }}" class="btn btn-sm btn-outline-primary" title="Edit">
            <i class="bi bi-pencil"></i>
        </a>
        <form action="{{ url_for('main.delete_snippet', snippet_id=snippet.id) }}" method="POST" class="d-inline" onsubmit="return confirm('Delete this snippet?');">
            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                <i class="bi bi-trash"></i>
            </button>
        </form>
    </div>
</div>
{% endfor %}

{# Include pagination info #}
<div id="pagination-info" 
     data-has-next="{{ '1' if snippets.has_next else '0' }}" 
     data-next-page="{{ snippets.next_num if snippets.has_next else '' }}">
</div>
