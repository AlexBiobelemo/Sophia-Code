{% extends "base.html" %}

{% block content %}
<div class="page-container">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
    <div>
      <h1 class="page-title mb-1">Version Diff</h1>
      <div class="text-muted small">
        <span class="fw-semibold">{{ snippet.title }}</span>
        <span class="mx-2">•</span>
        <span>{{ version.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
      </div>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('main.view_snippet', snippet_id=snippet.id) }}">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>

  <div class="card ai-snippet-card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-diagram-3 me-2"></i>Changes</span>
      <span class="badge bg-primary bg-opacity-10 text-primary">Context diff</span>
    </div>
    <div class="card-body p-0">
      <div class="diff-wrap" role="region" aria-label="Code diff">
        {{ diff_html | safe }}
      </div>
    </div>
  </div>
</div>

<style>
  .diff-wrap {
    overflow: auto;
    padding: 1rem;
  }

  .diff-wrap table.diff {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  .diff-wrap .diff_header {
    font-weight: 600;
    color: var(--bs-body-color);
  }

  .diff-wrap td,
  .diff-wrap th {
    padding: 0.35rem 0.5rem;
    border: 1px solid rgba(var(--bs-border-color-rgb), 0.4);
    vertical-align: top;
  }

  .diff-wrap .diff_next {
    background: rgba(var(--bs-primary-rgb), 0.08);
  }

  .diff-wrap .diff_add {
    background: rgba(var(--bs-success-rgb), 0.15);
  }

  .diff-wrap .diff_sub {
    background: rgba(var(--bs-danger-rgb), 0.15);
  }

  .diff-wrap .diff_chg {
    background: rgba(var(--bs-warning-rgb), 0.18);
  }

  .diff-wrap a {
    color: var(--bs-primary);
  }
</style>
{% endblock %}
